# ─── NTBuilder Web — nginx snippet ───────────────────────────────────────────
#
# Add this block inside your server {} block that handles nanoeng.unb.br.
# Assumes the FastAPI app runs locally on port 8765.
#
# Full path: www.nanoeng.unb.br/ntbuilder
#
# After adding this snippet, run:
#   sudo nginx -t && sudo systemctl reload nginx

    location /ntbuilder {
        # Strip /ntbuilder prefix before forwarding to FastAPI
        # (FastAPI serves from / internally)
        rewrite ^/ntbuilder(/.*)$ $1 break;
        rewrite ^/ntbuilder$      /  break;

        proxy_pass         http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow larger CIF uploads (10 MB)
        client_max_body_size 10m;

        # Timeouts — building large nanotubes can take a few seconds
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

# ─── IMPORTANT ───────────────────────────────────────────────────────────────
# If you run FastAPI under a path prefix (/ntbuilder), you must also tell
# FastAPI about it. Start uvicorn with:
#
#   uvicorn api.main:app --root-path /ntbuilder --host 127.0.0.1 --port 8765
#
# OR add to the systemd ExecStart:
#   --root-path /ntbuilder
#
# This ensures the /docs and /openapi.json URLs work correctly.
